version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tsg
      POSTGRES_USER: tsg
      POSTGRES_PASSWORD: tsg
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsg"]
      interval: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
