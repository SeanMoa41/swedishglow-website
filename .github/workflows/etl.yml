name: ETL

on:
  push:
    paths: ['tsg-backend/etl/**']
  pull_request:
    paths: ['tsg-backend/etl/**']

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
        working-directory: tsg-backend/etl
      - name: Syntax check (no ETL tests yet)
        run: python -m py_compile tsg-backend/etl/tl_invoices_sync/__init__.py tsg-backend/etl/wc_orders_sync/__init__.py

  deploy-staging:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Install ETL dependencies into package dir
        run: |
          pip install -r tsg-backend/etl/requirements.txt \
            --target tsg-backend/etl/.python_packages/lib/site-packages
      - name: Deploy to staging Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.FUNCTIONS_APP_NAME }}
          package: tsg-backend/etl

  deploy-prod:
    needs: deploy-staging
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Install ETL dependencies into package dir
        run: |
          pip install -r tsg-backend/etl/requirements.txt \
            --target tsg-backend/etl/.python_packages/lib/site-packages
      - name: Deploy to production Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.FUNCTIONS_APP_NAME }}
          package: tsg-backend/etl
