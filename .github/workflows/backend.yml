name: Backend

on:
  push:
    paths:
      - 'tsg-backend/**'
      - '!tsg-backend/etl/**'
  pull_request:
    paths:
      - 'tsg-backend/**'
      - '!tsg-backend/etl/**'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tsg
          POSTGRES_USER: tsg
          POSTGRES_PASSWORD: tsg
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
        working-directory: tsg-backend
      - run: pytest tests/ -v
        working-directory: tsg-backend
        env:
          DATABASE_URL: postgresql+asyncpg://tsg:tsg@localhost:5432/tsg
          DATABASE_URL_SYNC: postgresql+psycopg2://tsg:tsg@localhost:5432/tsg
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          SUPABASE_JWT_SECRET: placeholder-secret-32-chars-minimum
          WEBHOOK_SECRET: placeholder

  deploy-staging:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build and push to ACR
        id: build
        run: |
          ACR_NAME=$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d. -f1)
          az acr login --name $ACR_NAME
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/tsg-backend:${{ github.sha }}
          docker build -t $IMAGE tsg-backend/
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
      - name: Update staging Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ steps.build.outputs.image }}

  deploy-prod:
    needs: deploy-staging
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Update production Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ needs.deploy-staging.outputs.image }}
