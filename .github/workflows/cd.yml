name: CD

# Deploys to Azure Container Apps after CI passes on main.
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS        — service principal JSON:
#                              az ad sp create-for-rbac --name tsg-backend-sp \
#                                --role contributor \
#                                --scopes /subscriptions/<id>/resourceGroups/tsg-backend-rg \
#                                --sdk-auth
#   REGISTRY_LOGIN_SERVER    — e.g. tsgbackendacr.azurecr.io
#   REGISTRY_USERNAME        — ACR admin username
#   REGISTRY_PASSWORD        — ACR admin password
#   AZURE_RESOURCE_GROUP     — e.g. tsg-backend-rg
#   AZURE_APP_NAME           — e.g. tsg-backend

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        working-directory: tsg-backend
        run: |
          IMAGE=${{ secrets.REGISTRY_LOGIN_SERVER }}/tsg-backend
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_APP_NAME }}
          imageToDeploy: ${{ secrets.REGISTRY_LOGIN_SERVER }}/tsg-backend:${{ github.sha }}
